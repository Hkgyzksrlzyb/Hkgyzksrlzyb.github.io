<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新员工入职指南 - 首页</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* lighter bg like image */
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px; /* space for bottom nav */
        
            font-size: 16px;
            line-height: 1.5;}

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }

        .welcome-text {
            color: #0c4a6e;
            font-weight: bold;
            font-size: 18px;
        }

        .notification-icon {
            color: #0c4a6e;
            font-size: 20px;
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            position: relative;
        }
        
        .hero-badge {
            position: absolute;
            top: 20px;
            right: 40px;
            background-color: #ffedd5;
            color: #9a3412;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transform: rotate(15deg);
            z-index: 10;
        }

        .hero-image-placeholder {
            width: 120px;
            height: 120px;
            background-color: #1e293b;
            border-radius: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
            padding: 4px;
        }

        .hero-mascot {
            width: 118px;
            height: 118px;
            object-fit: contain;
            object-position: center bottom;
            transform: translateY(5px);
        }

        .hero-title {
            font-size: 20px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .hero-subtitle {
            background-color: #e0f2fe;
            color: #0284c7;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .hero-status {
            display: flex;
            align-items: center;
            color: #475569;
            font-size: 16px;
            gap: 8px;
        }

        .module-card {
            background-color: white;
            border-radius: 30px; /* more rounded like image */
            padding: 20px 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .icon-container {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-right: 20px;
        }

        .icon-blue {
            background-color: #e0f2fe;
            color: #0284c7;
        }
        
        .icon-green {
            background-color: #dcfce7;
            color: #16a34a;
        }

        .icon-orange {
            background-color: #ffedd5;
            color: #ea580c;
        }

        .card-content {
            flex: 1;
        }

        .card-title {
            font-weight: bold;
            color: #1e293b;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
        }

        .card-subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .chevron {
            color: #cbd5e1;
            margin-left: auto;
        }

        .tip-card {
            background-color: transparent;
            border: 2px dashed #bbf7d0;
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .tip-icon {
            font-size: 30px;
            color: #fbbf24;
        }

        .tip-title {
            color: #0369a1;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .tip-text {
            color: #475569;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 15px 0;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
            z-index: 50;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            font-size: 12px;
            gap: 5px;
            padding: 10px 20px;
            border-radius: 20px;
        }

        .nav-item.active {
            background-color: #cffafe;
            color: #0891b2;
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="header-top">
        <div class="user-profile">
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <span class="welcome-text">欢迎回家</span>
        </div>
        <i class="fa-solid fa-bell notification-icon"></i>
    </div>

    <div class="hero-section">
        
        <div class="hero-image-placeholder">
            <img class="hero-mascot" src="assets/old-man-mascot.png" alt="欢迎小助手">
        </div>
        
        <h1 class="hero-title">欢迎加入我们！</h1>
        <div class="hero-subtitle">欢迎加入团队！</div>
        <div class="hero-status">
            <i class="fa-solid fa-party-horn text-teal-600"></i>
            <span>入职第一天</span>
        </div>
    </div>

    <div class="px-6 mt-8">
        <a href="onboarding.html" class="module-card">
            <div class="icon-container icon-blue">
                <i class="fa-solid fa-book-open-reader"></i>
            </div>
            <div class="card-content">
                <span class="card-title">入职须知</span>
                <span class="card-subtitle">入职指南</span>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </a>

        <a href="process.html" class="module-card">
            <div class="icon-container icon-green">
                <i class="fa-solid fa-diagram-project"></i>
            </div>
            <div class="card-content">
                <span class="card-title">业务流程及常见问题</span>
                <span class="card-subtitle">业务流程与常见问题</span>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </a>

        <a href="knowledge.html" class="module-card">
            <div class="icon-container icon-orange">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="card-content">
                <span class="card-title">知识</span>
                <span class="card-subtitle">知识库</span>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </a>

        <div class="tip-card">
            <i class="fa-regular fa-lightbulb tip-icon"></i>
            <div>
                <div class="tip-title">小贴士！</div>
                <div class="tip-text">查看您的欢迎邮件，获取团队欢迎安排。让我们开启美好的一天吧！</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house nav-icon"></i>
            <span>首页</span>
        </a>
        <a href="onboarding.html" class="nav-item">
            <i class="fa-solid fa-book nav-icon"></i>
            <span>入职指南</span>
        </a>
        <a href="process.html" class="nav-item">
            <i class="fa-solid fa-diagram-project nav-icon"></i>
            <span>业务流程</span>
        </a>
        <a href="knowledge.html" class="nav-item">
            <i class="fa-solid fa-book-journal-whills nav-icon"></i>
            <span>知识库</span>
        </a>
    </nav>
</body>

</html>
